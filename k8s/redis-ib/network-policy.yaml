# redis-ib ingress — Trade + Platform NS + same-namespace IB Gateway pods.
# ACL enforces write isolation (trade-dev read-only on operator keys).
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: redis-ib-ingress
  labels:
    app.kubernetes.io/name: redis-ib
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: redis-ib
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: data
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: bifrost-dev
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: bifrost-stg
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: bifrost-prod
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: bifrost-platform-prod
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: bifrost-platform-stg
      ports:
        - protocol: TCP
          port: 6379
