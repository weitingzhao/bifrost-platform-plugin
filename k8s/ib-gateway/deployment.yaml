apiVersion: apps/v1
kind: Deployment
metadata:
  name: ib-gateway
  labels:
    app.kubernetes.io/name: ib-gateway
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: ib-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ib-gateway
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: ib-gateway
          image: bifrost-platform-plugin-ib-gateway:0.1.0
          imagePullPolicy: IfNotPresent
          env:
            - name: IB_GATEWAY_CONFIG
              value: /config/gateway.yaml
            - name: REDIS_IB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ib-gateway-redis
                  key: password
            - name: IB_GATEWAY_MODE
              valueFrom:
                configMapKeyRef:
                  name: ib-gateway-config
                  key: mode
                  optional: true
          volumeMounts:
            - name: config
              mountPath: /config/gateway.yaml
              subPath: gateway.yaml
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          livenessProbe:
            exec:
              command:
                - python
                - -c
                - "import redis,os; r=redis.Redis(host='redis-ib.data.svc.cluster.local',username='ib-gateway',password=os.environ['REDIS_IB_PASSWORD']); r.ping()"
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 10
      volumes:
        - name: config
          configMap:
            name: ib-gateway-config
